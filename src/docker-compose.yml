services:
  banco:
    image: mysql:8.0
    container_name: bd_api
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: "0511"
      MYSQL_DATABASE: bd_api
      MYSQL_USER: api_user
      MYSQL_PASSWORD: "0511"
    ports:
      - "3307:3306"
    volumes:
      #- ./docs/banco.sql:/docker-entrypoint-initdb.d/banco.sql
      - dados_mysql:/var/lib/mysql

volumes:
  dados_mysql: